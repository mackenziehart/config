<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Config 2026 — Agenda Planner</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg-secondary: #f5f5f3; --text: #1a1a1a; --text-secondary: #6b6b6b;
      --border: rgba(0,0,0,0.12); --border-secondary: rgba(0,0,0,0.25);
      --radius-md: 8px; --radius-lg: 12px;
      --purple-fill: #EEEDFE; --purple-border: #7F77DD; --purple-text: #3C3489; --purple-sub: #534AB7;
      --amber-fill: #FAEEDA; --amber-border: #EF9F27; --amber-text: #854F0B;
      --teal-text: #0F6E56; --teal-border: #1D9E75;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a1a; --bg-secondary: #242424; --text: #f0f0f0; --text-secondary: #999;
        --border: rgba(255,255,255,0.12); --border-secondary: rgba(255,255,255,0.25);
        --purple-fill: #26215C; --purple-border: #7F77DD; --purple-text: #CECBF6; --purple-sub: #AFA9EC;
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .container { max-width: 720px; margin: 0 auto; padding: 2rem 1.25rem; }
    h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
    .subtitle { font-size: 14px; color: var(--text-secondary); margin-bottom: 1.5rem; }
    .header-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 4px; flex-wrap: wrap; }
    .user-pill { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-secondary); padding: 5px 12px; border: 0.5px solid var(--border); border-radius: 99px; cursor: pointer; background: none; white-space: nowrap; }
    .user-pill:hover { background: var(--bg-secondary); }
    .tabs { display: flex; gap: 4px; margin-bottom: 1.5rem; border-bottom: 0.5px solid var(--border); }
    .tab { padding: 8px 16px; font-size: 14px; background: none; border: none; cursor: pointer; color: var(--text-secondary); border-bottom: 2px solid transparent; margin-bottom: -1px; }
    .tab.active { color: var(--text); font-weight: 500; border-bottom-color: var(--text); }
    .day-label { font-size: 13px; font-weight: 500; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem; margin-top: 1.5rem; }
    .session-card { display: flex; align-items: flex-start; gap: 12px; padding: 12px 14px; border: 0.5px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 8px; background: var(--bg); transition: border-color 0.15s; }
    .session-card:hover { border-color: var(--border-secondary); }
    .session-card.saved { border-color: var(--purple-border); background: var(--purple-fill); }
    .session-card.saved .s-title { color: var(--purple-text); }
    .session-card.saved .s-meta { color: var(--purple-sub); }
    .s-time { font-size: 12px; color: var(--text-secondary); min-width: 80px; padding-top: 2px; flex-shrink: 0; }
    .s-body { flex: 1; min-width: 0; }
    .s-title { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
    .s-meta { font-size: 12px; color: var(--text-secondary); }
    .s-tags { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
    .tag { font-size: 11px; padding: 2px 8px; border-radius: 99px; background: var(--bg-secondary); color: var(--text-secondary); border: 0.5px solid var(--border); }
    .conflict-badge { font-size: 11px; padding: 2px 8px; background: var(--amber-fill); color: var(--amber-text); border-radius: 99px; border: 0.5px solid var(--amber-border); }
    .attendees { display: flex; align-items: center; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
    .avatar-list { display: flex; }
    .avatar { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 50%; font-size: 10px; font-weight: 500; border: 1.5px solid var(--bg); margin-right: -6px; color: #fff; flex-shrink: 0; }
    .att-names { font-size: 12px; color: var(--text-secondary); margin-left: 10px; }
    .att-names.mine { color: var(--purple-sub); }
    .save-btn { background: none; border: 0.5px solid var(--border-secondary); border-radius: var(--radius-md); width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); font-size: 16px; flex-shrink: 0; transition: all 0.15s; }
    .save-btn:hover { background: var(--bg-secondary); }
    .save-btn.saved { color: var(--purple-sub); border-color: var(--purple-border); }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
    .stat { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 12px; text-align: center; }
    .stat-n { font-size: 22px; font-weight: 500; }
    .stat-l { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    .share-bar { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border: 0.5px solid var(--border); border-radius: var(--radius-lg); background: var(--bg-secondary); margin-bottom: 1.5rem; }
    .share-bar input { flex: 1; background: none; border: none; font-size: 12px; color: var(--text-secondary); outline: none; font-family: monospace; min-width: 0; }
    button { font-family: inherit; font-size: 14px; padding: 8px 16px; border-radius: var(--radius-md); border: 0.5px solid var(--border-secondary); background: none; color: var(--text); cursor: pointer; transition: background 0.15s; }
    button:hover { background: var(--bg-secondary); }
    input[type="text"] { font-family: inherit; font-size: 14px; padding: 8px 12px; border-radius: var(--radius-md); border: 0.5px solid var(--border-secondary); background: var(--bg); color: var(--text); outline: none; width: 100%; }
    input[type="text"]:focus { border-color: var(--purple-border); }
    .onboard { max-width: 340px; margin: 3rem auto; padding: 2rem; border: 0.5px solid var(--border); border-radius: var(--radius-lg); }
    .onboard h2 { font-size: 18px; font-weight: 500; margin-bottom: 6px; }
    .onboard p { font-size: 14px; color: var(--text-secondary); margin-bottom: 1.25rem; line-height: 1.6; }
    .onboard input { margin-bottom: 10px; }
    .onboard button { width: 100%; margin-top: 4px; }
    .err { font-size: 13px; color: #c0392b; margin-top: 4px; }
    .empty { text-align: center; padding: 3rem 1rem; color: var(--text-secondary); font-size: 14px; }
    .empty i { font-size: 32px; display: block; margin-bottom: 12px; opacity: 0.3; }
    .team-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
    .team-avatar { width: 36px; height: 36px; border-radius: 50%; font-size: 13px; font-weight: 500; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: #fff; }
  </style>
</head>
<body>
<div class="container" id="app">
  <div class="empty"><i class="ti ti-loader"></i>Loading…</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPABASE_URL = "https://xuyvsqhotkmlqcnyvgom.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1eXZzcWhvdGttbHFjbnl2Z29tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1NjA1OTcsImV4cCI6MjA5NzEzNjU5N30.sMPnVPRpeDhiJQbGATiHuOezgqwzscqer6FBbx_OSvg";

const SESSIONS = [
  // June 23 — Config Commons day
  { id:1,  day:"June 23", time:"9:00 AM – 7:00 PM",  title:"Badge pickup",                                                      speaker:"",                                        room:"Moscone North",   tags:["logistics"] },
  { id:2,  day:"June 23", time:"12:00 – 7:00 PM",    title:"Config Commons — community hangout & swag",                         speaker:"",                                        room:"Config Commons",  tags:["social","community"] },
  // June 24 — Day 1
  { id:3,  day:"June 24", time:"9:00 – 10:20 AM",    title:"Opening keynote: Figma product launch",                             speaker:"Dylan Field, Jayse Hansen",               room:"Main Stage",      tags:["keynote","product"] },
  { id:4,  day:"June 24", time:"10:35 – 10:55 AM",   title:"The rules are the art: creating with AI",                           speaker:"Holly Herndon",                           room:"Main Stage",      tags:["keynote","ai"] },
  { id:5,  day:"June 24", time:"11:10 – 11:30 AM",   title:"Scooter, screen and duct-tape: whatever-it-takes prototyping",      speaker:"Unnikrishnan Manikoth, Harish Kumar",     room:"Level 2 Stage",   tags:["prototyping","hardware"] },
  { id:6,  day:"June 24", time:"11:10 – 11:30 AM",   title:"Ready for the world",                                               speaker:"Vicki Tan",                               room:"Mezzanine Stage", tags:["illustration","storytelling"] },
  { id:7,  day:"June 24", time:"11:10 – 11:30 AM",   title:"Google Workspace: session to be announced",                         speaker:"Addison Rodomista, Chloe Fagan-Tucker",   room:"Maker Stage",     tags:["workflows","product"] },
  { id:8,  day:"June 24", time:"11:15 AM – 12:15 PM","title":"Figma deep dive",                                                  speaker:"Figma team",                              room:"Main Stage",      tags:["figma","product"] },
  { id:9,  day:"June 24", time:"11:30 – 11:50 AM",   title:"Dimensional shift: sculpting in Figma Draw",                        speaker:"Josh McKenna",                            room:"Mezzanine Stage", tags:["illustration","visual design"] },
  { id:10, day:"June 24", time:"11:30 – 11:50 AM",   title:"Beyond design systems: designing for robots and seniors",           speaker:"Anna Oh",                                 room:"Level 2 Stage",   tags:["ai","accessibility","research"] },
  { id:11, day:"June 24", time:"11:50 AM – 12:10 PM","title":"How to build content systems for AI product workflows",            speaker:"Jessica Ouyang, Jolena Ma",               room:"Maker Stage",     tags:["ai","content design","workflows"] },
  { id:12, day:"June 24", time:"11:50 AM – 12:10 PM","title":"Figma meets hardware: prototyping for the physical world",         speaker:"Frederik Ueberschär, Sam Thorne",         room:"Level 2 Stage",   tags:["hardware","prototyping"] },
  { id:13, day:"June 24", time:"11:50 AM – 12:10 PM","title":"Out of sync, on purpose: desktop design after mobile won",         speaker:"Giulio Fagiolini",                        room:"Mezzanine Stage", tags:["ux","workflows"] },
  { id:14, day:"June 24", time:"2:55 – 3:15 PM",     title:"Your best practices are trapped in your head — and your AI has no idea", speaker:"Harald Kirschner",               room:"Level 2 Stage",   tags:["ai","workflows"] },
  // June 25 — Day 2
  { id:15, day:"June 25", time:"9:00 – 10:00 AM",    title:"Opening keynotes: death of the finished state",                     speaker:"Brent David Freaney",                     room:"Main Stage",      tags:["keynote","brand","visual design"] },
  { id:16, day:"June 25", time:"12:45 – 1:05 PM",    title:"The canvas is not dead",                                            speaker:"Catt Small",                              room:"Mezzanine Stage", tags:["ai","ux","workflows"] },
  { id:17, day:"June 25", time:"1:30 – 1:50 PM",     title:"AI gold: the first design system in Figma Make",                   speaker:"Harvey Whiting",                          room:"Level 2 Stage",   tags:["ai","design systems","prototyping"] },
];

const DAYS = ["June 23", "June 24", "June 25"];
const COLORS = ["#7F77DD","#1D9E75","#D85A30","#378ADD","#BA7517","#D4537E","#639922"];

let sb, currentUser, allBookmarks = [], allUsers = [], activeTab = "all", copied = false, nameErr = "";

function getInitials(name) {
  return name.split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 2);
}
function userColor(uid) {
  let h = 0; for (let c of uid) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
  return COLORS[h % COLORS.length];
}

async function init() {
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  const stored = localStorage.getItem("cfg26_uid");
  if (stored) {
    const { data } = await sb.from("users").select("*").eq("id", stored).single();
    if (data) currentUser = data;
  }
  await loadData();
  render();
  sb.channel("realtime-all")
    .on("postgres_changes", { event: "*", schema: "public", table: "bookmarks" }, async () => { await loadData(); render(); })
    .on("postgres_changes", { event: "*", schema: "public", table: "users" }, async () => { await loadData(); render(); })
    .subscribe();
}

async function loadData() {
  const [{ data: bData }, { data: uData }] = await Promise.all([
    sb.from("bookmarks").select("*"),
    sb.from("users").select("*"),
  ]);
  allBookmarks = bData || [];
  allUsers = uData || [];
}

async function registerUser() {
  const input = document.getElementById("name-input");
  const name = (input ? input.value : "").trim();
  nameErr = "";
  if (!name) { nameErr = "Please enter your name."; render(); return; }
  const { data, error } = await sb.from("users").insert({ name }).select().single();
  if (error || !data) { nameErr = "Something went wrong — try again."; render(); return; }
  localStorage.setItem("cfg26_uid", data.id);
  currentUser = data;
  await loadData();
  render();
}

async function toggleSave(sid) {
  if (!currentUser) return;
  const exists = allBookmarks.find(b => b.user_id === currentUser.id && b.session_id === sid);
  if (exists) {
    await sb.from("bookmarks").delete().eq("user_id", currentUser.id).eq("session_id", sid);
    allBookmarks = allBookmarks.filter(b => !(b.user_id === currentUser.id && b.session_id === sid));
  } else {
    await sb.from("bookmarks").insert({ user_id: currentUser.id, session_id: sid });
    allBookmarks = [...allBookmarks, { user_id: currentUser.id, session_id: sid }];
  }
  render();
}

function myBookmarkSet() {
  if (!currentUser) return new Set();
  return new Set(allBookmarks.filter(b => b.user_id === currentUser.id).map(b => b.session_id));
}

function getConflicts(savedIds) {
  const saved = SESSIONS.filter(s => savedIds.has(s.id));
  const conflicts = new Set();
  for (let i = 0; i < saved.length; i++)
    for (let j = i + 1; j < saved.length; j++)
      if (saved[i].day === saved[j].day && saved[i].time === saved[j].time) {
        conflicts.add(saved[i].id); conflicts.add(saved[j].id);
      }
  return conflicts;
}

function getAttendeesFor(sid) {
  const uids = allBookmarks.filter(b => b.session_id === sid).map(b => b.user_id);
  return allUsers.filter(u => uids.includes(u.id));
}

function copyLink() {
  navigator.clipboard.writeText(window.location.href).then(() => {
    copied = true; render();
    setTimeout(() => { copied = false; render(); }, 2000);
  });
}

function logout() {
  localStorage.removeItem("cfg26_uid");
  currentUser = null; activeTab = "all"; render();
}

function renderAttendees(sid) {
  const attendees = getAttendeesFor(sid);
  if (!attendees.length) return "";
  const isMe = currentUser && attendees.find(u => u.id === currentUser.id);
  const others = attendees.filter(u => !currentUser || u.id !== currentUser.id);
  const names = [isMe ? "you" : null, ...others.map(u => u.name)].filter(Boolean);
  const display = names.length <= 2 ? names.join(" & ") : names.slice(0, 2).join(", ") + ` + ${names.length - 2} more`;
  return `<div class="attendees">
    <div class="avatar-list">${attendees.slice(0, 5).map(u => `<div class="avatar" style="background:${userColor(u.id)}">${getInitials(u.name)}</div>`).join("")}</div>
    <span class="att-names ${isMe ? "mine" : ""}">${display} going</span>
  </div>`;
}

function renderSession(s, conflicts) {
  const saved = myBookmarkSet();
  const isSaved = saved.has(s.id);
  const hasConflict = conflicts.has(s.id);
  return `<div class="session-card ${isSaved ? "saved" : ""}">
    <div class="s-time">${s.time}</div>
    <div class="s-body">
      <div style="display:flex;align-items:center;flex-wrap:wrap;gap:6px">
        <span class="s-title">${s.title}</span>
        ${hasConflict ? `<span class="conflict-badge">⚡ conflict</span>` : ""}
      </div>
      <div class="s-meta">${s.speaker ? s.speaker + " · " : ""}${s.room}</div>
      <div class="s-tags">${s.tags.map(t => `<span class="tag">${t}</span>`).join("")}</div>
      ${renderAttendees(s.id)}
    </div>
    <button class="save-btn ${isSaved ? "saved" : ""}" onclick="toggleSave(${s.id})" aria-label="${isSaved ? "Remove from agenda" : "Add to agenda"}">
      <i class="ti ${isSaved ? "ti-bookmark-filled" : "ti-bookmark"}" aria-hidden="true"></i>
    </button>
  </div>`;
}

function render() {
  const app = document.getElementById("app");
  if (!currentUser) {
    app.innerHTML = `<div class="onboard">
      <h2>Who are you?</h2>
      <p>Enter your name so teammates can see which sessions you're attending.</p>
      <input type="text" id="name-input" placeholder="Your name" onkeydown="if(event.key==='Enter')registerUser()" autofocus />
      ${nameErr ? `<div class="err">${nameErr}</div>` : ""}
      <button onclick="registerUser()">Join the agenda</button>
    </div>`;
    return;
  }

  const saved = myBookmarkSet();
  const conflicts = getConflicts(saved);
  const mySessions = SESSIONS.filter(s => saved.has(s.id));

  let html = `
    <div class="header-row">
      <div>
        <h1>Config 2026 — agenda planner</h1>
        <p class="subtitle">June 23–25 · Moscone Center, San Francisco</p>
      </div>
      <button class="user-pill" onclick="logout()" title="Switch name">
        <div style="width:20px;height:20px;border-radius:50%;background:${userColor(currentUser.id)};color:#fff;font-size:9px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0">${getInitials(currentUser.name)}</div>
        ${currentUser.name}
        <i class="ti ti-logout" style="font-size:13px" aria-hidden="true"></i>
      </button>
    </div>
    <div class="tabs">
      <button class="tab ${activeTab === "all" ? "active" : ""}" onclick="setTab('all')">All sessions</button>
      <button class="tab ${activeTab === "mine" ? "active" : ""}" onclick="setTab('mine')">My agenda${saved.size ? " (" + saved.size + ")" : ""}</button>
      <button class="tab ${activeTab === "team" ? "active" : ""}" onclick="setTab('team')">Team</button>
    </div>`;

  if (activeTab === "all") {
    for (const day of DAYS) {
      html += `<div class="day-label">${day}</div>`;
      SESSIONS.filter(s => s.day === day).forEach(s => html += renderSession(s, conflicts));
    }
  } else if (activeTab === "mine") {
    if (!saved.size) {
      html += `<div class="empty"><i class="ti ti-bookmark"></i>No sessions saved yet.<br>Browse all sessions and tap the bookmark to add them.</div>`;
    } else {
      html += `<div class="stats">
        <div class="stat"><div class="stat-n">${saved.size}</div><div class="stat-l">sessions</div></div>
        <div class="stat"><div class="stat-n">${Math.round(conflicts.size / 2)}</div><div class="stat-l">conflicts</div></div>
        <div class="stat"><div class="stat-n">${allUsers.length}</div><div class="stat-l">teammates</div></div>
      </div>
      <div class="share-bar">
        <i class="ti ti-share" style="font-size:16px;color:var(--text-secondary);flex-shrink:0" aria-hidden="true"></i>
        <input type="text" value="${window.location.href}" readonly onclick="this.select()" />
        <button onclick="copyLink()" style="${copied ? "color:var(--teal-text);border-color:var(--teal-border)" : ""}">${copied ? "✓ copied" : "copy link"}</button>
      </div>`;
      for (const day of DAYS) {
        const ds = mySessions.filter(s => s.day === day);
        if (!ds.length) continue;
        html += `<div class="day-label">${day}</div>`;
        ds.forEach(s => html += renderSession(s, conflicts));
      }
    }
  } else {
    if (!allUsers.length) {
      html += `<div class="empty"><i class="ti ti-users"></i>No teammates yet — share the link!</div>`;
    } else {
      allUsers.forEach(u => {
        const count = allBookmarks.filter(b => b.user_id === u.id).length;
        const isMe = u.id === currentUser.id;
        html += `<div class="team-row">
          <div class="team-avatar" style="background:${userColor(u.id)}">${getInitials(u.name)}</div>
          <div style="flex:1">
            <div style="font-size:14px;font-weight:500">${u.name}${isMe ? " (you)" : ""}</div>
            <div style="font-size:12px;color:var(--text-secondary)">${count} session${count !== 1 ? "s" : ""} saved</div>
          </div>
        </div>`;
      });
    }
    html += `<div class="share-bar" style="margin-top:1.5rem">
      <i class="ti ti-link" style="font-size:16px;color:var(--text-secondary);flex-shrink:0" aria-hidden="true"></i>
      <input type="text" value="${window.location.href}" readonly onclick="this.select()" />
      <button onclick="copyLink()" style="${copied ? "color:var(--teal-text);border-color:var(--teal-border)" : ""}">${copied ? "✓ copied" : "invite teammates"}</button>
    </div>`;
  }

  app.innerHTML = html;
}

window.toggleSave = toggleSave;
window.registerUser = registerUser;
window.setTab = (t) => { activeTab = t; render(); };
window.copyLink = copyLink;
window.logout = logout;

init();
</script>
</body>
</html>
