async function load(){
  const [b,u]=await Promise.all([sb.from("bookmarks").select("*"),sb.from("users").select("*")]);
  bookmarks=b.data||[]; users=u.data||[];
}

async function register(){
  const el=document.getElementById("ni"); const name=(el?el.value:"").trim(); nameErr="";
  if(!name){nameErr="Please enter your name.";render();return;}
  const {data,error}=await sb.from("users").insert({name}).select().single();
  if(error||!data){nameErr="Something went wrong—try again.";render();return;}
  localStorage.setItem("cfg26_uid",data.id); me=data; await load(); render();
}

async function toggleSave(sid){
  if(!me) return;
  const has=bookmarks.find(b=>b.user_id===me.id&&b.session_id===sid);
  if(has){ await sb.from("bookmarks").delete().eq("user_id",me.id).eq("session_id",sid); bookmarks=bookmarks.filter(b=>!(b.user_id===me.id&&b.session_id===sid)); }
  else { await sb.from("bookmarks").insert({user_id:me.id,session_id:sid}); bookmarks=[...bookmarks,{user_id:me.id,session_id:sid}]; }
  render();
}

const mySet=()=>me?new Set(bookmarks.filter(b=>b.user_id===me.id).map(b=>b.session_id)):new Set();

function conflicts(ids){
  const ss=S.filter(s=>ids.has(s.id)); const cx=new Set();
  for(let i=0;i<ss.length;i++) for(let j=i+1;j<ss.length;j++)
    if(ss[i].day===ss[j].day&&ss[i].time===ss[j].time){cx.add(ss[i].id);cx.add(ss[j].id);}
  return cx;
}

function attendees(sid){ const uids=bookmarks.filter(b=>b.session_id===sid).map(b=>b.user_id); return users.filter(u=>uids.includes(u.id)); }

function copyLink(){ navigator.clipboard.writeText(location.href).then(()=>{copied=true;render();setTimeout(()=>{copied=false;render();},2000);}); }
function logout(){ localStorage.removeItem("cfg26_uid"); me=null; tab="all"; render(); }

function renderAtt(sid){
  const att=attendees(sid); if(!att.length) return "";
  const isMe=me&&att.find(u=>u.id===me.id);
  const others=att.filter(u=>!me||u.id!==me.id);
  const names=[isMe?"you":null,...others.map(u=>u.name)].filter(Boolean);
  const disp=names.length<=2?names.join(" & "):names.slice(0,2).join(", ")+` + ${names.length-2} more`;
  return `<div class="att"><div class="avlist">${att.slice(0,5).map(u=>`<div class="av" style="background:${uc(u.id)}">${gi(u.name)}</div>`).join("")}</div><span class="anames ${isMe?"me":""}">${disp} going</span></div>`;
}

function renderCard(s,cx){
  const saved=mySet(); const sv=saved.has(s.id); const conflict=cx.has(s.id);
  return `<div class="card ${sv?"saved":""}">
    <div class="ctime">${s.time}</div>
    <div class="cbody">
      <div style="display:flex;align-items:center;flex-wrap:wrap;gap:5px"><span class="ct">${s.title}</span>${conflict?`<span class="conflict">⚡ conflict</span>`:""}</div>
      <div class="cm">${s.speaker?s.speaker+" · ":""}${s.room}</div>
      <div class="tags">${s.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>
      ${renderAtt(s.id)}
    </div>
    <button class="sbtn ${sv?"saved":""}" onclick="toggleSave(${s.id})" aria-label="${sv?"Remove":"Save"}"><i class="ti ${sv?"ti-bookmark-filled":"ti-bookmark"}"></i></button>
  </div>`;
}

const ALL_TAGS=[...new Set(S.flatMap(s=>s.tags))].filter(t=>t!=="logistics"&&t!=="social"&&t!=="community").sort();

function render(){
  const app=document.getElementById("app");
  if(!me){ app.innerHTML=`<div class="onboard"><h2>Who are you?</h2><p>Enter your name so teammates can see which sessions you're planning to attend.</p><input type="text" id="ni" placeholder="Your name" onkeydown="if(event.key==='Enter')register()" autofocus />${nameErr?`<div class="err">${nameErr}</div>`:""}<button onclick="register()">Join the agenda</button></div>`; return; }
  const saved=mySet(); const cx=conflicts(saved); const mine=S.filter(s=>saved.has(s.id));
  let filtered=S;
  if(search) filtered=filtered.filter(s=>s.title.toLowerCase().includes(search.toLowerCase())||s.speaker.toLowerCase().includes(search.toLowerCase()));
  if(filterTag) filtered=filtered.filter(s=>s.tags.includes(filterTag));

  let html=`<div class="hrow"><div><h1>Config 2026 — agenda planner</h1><p class="sub">June 23–25 · Moscone Center, San Francisco</p></div>
    <button class="upill" onclick="logout()" title="Switch name"><div style="width:20px;height:20px;border-radius:50%;background:${uc(me.id)};color:#fff;font-size:9px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0">${gi(me.name)}</div>${me.name}<i class="ti ti-logout" style="font-size:12px"></i></button></div>
  <div class="tabs"><button class="tab ${tab==="all"?"active":""}" onclick="setTab('all')">All sessions</button><button class="tab ${tab==="mine"?"active":""}" onclick="setTab('mine')">My agenda${saved.size?" ("+saved.size+")":""}</button><button class="tab ${tab==="team"?"active":""}" onclick="setTab('team')">Team</button></div>`;

  if(tab==="all"){
    html+=`<div class="filter-row"><input type="text" placeholder="Search sessions or speakers…" value="${search}" oninput="doSearch(this.value)" />${ALL_TAGS.map(t=>`<button class="fchip ${filterTag===t?"on":""}" onclick="doFilter('${t}')">${t}</button>`).join("")}</div>`;
    for(const day of DAYS){
      const ds=filtered.filter(s=>s.day===day); if(!ds.length) continue;
      html+=`<div class="day-label">${day}</div>`; ds.forEach(s=>html+=renderCard(s,cx));
    }
  } else if(tab==="mine"){
    if(!saved.size){ html+=`<div class="empty"><i class="ti ti-bookmark"></i>No sessions saved yet.<br>Browse all sessions and tap ⊞ to add them.</div>`; }
    else {
      html+=`<div class="stats"><div class="stat"><div class="stat-n">${saved.size}</div><div class="stat-l">sessions</div></div><div class="stat"><div class="stat-n">${Math.round(cx.size/2)}</div><div class="stat-l">conflicts</div></div><div class="stat"><div class="stat-n">${users.length}</div><div class="stat-l">teammates</div></div></div>
      <div class="sbar"><i class="ti ti-share" style="font-size:15px;color:var(--text2);flex-shrink:0"></i><input type="text" value="${location.href}" readonly onclick="this.select()" /><button onclick="copyLink()" style="${copied?"color:var(--teal-t);border-color:var(--teal-b)":""}">${copied?"✓ copied":"copy link"}</button></div>`;
      for(const day of DAYS){ const ds=mine.filter(s=>s.day===day); if(!ds.length) continue; html+=`<div class="day-label">${day}</div>`; ds.forEach(s=>html+=renderCard(s,cx)); }
    }
  } else {
    if(!users.length){ html+=`<div class="empty"><i class="ti ti-users"></i>No teammates yet — share the link!</div>`; }
    else { users.forEach(u=>{ const n=bookmarks.filter(b=>b.user_id===u.id).length; const isMe=u.id===me.id; html+=`<div class="trow"><div class="tav" style="background:${uc(u.id)}">${gi(u.name)}</div><div style="flex:1"><div style="font-size:14px;font-weight:500">${u.name}${isMe?" (you)":""}</div><div style="font-size:12px;color:var(--text2)">${n} session${n!==1?"s":""} saved</div></div></div>`; }); }
    html+=`<div class="sbar" style="margin-top:1.5rem"><i class="ti ti-link" style="font-size:15px;color:var(--text2);flex-shrink:0"></i><input type="text" value="${location.href}" readonly onclick="this.select()" /><button onclick="copyLink()" style="${copied?"color:var(--teal-t);border-color:var(--teal-b)":""}">${copied?"✓ copied":"invite teammates"}</button></div>`;
  }
  app.innerHTML=html;
}

window.toggleSave=toggleSave; window.register=register;
window.setTab=t=>{tab=t;render();}; window.copyLink=copyLink; window.logout=logout;
window.doSearch=v=>{search=v;render();}; window.doFilter=t=>{filterTag=filterTag===t?"":t;render();};
init();
</script>
</body>
</html>
