  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg2: #f5f5f3; --text: #1a1a1a; --text2: #6b6b6b;
      --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.25);
      --r-md: 8px; --r-lg: 12px;
      --purple-bg: #EEEDFE; --purple-b: #7F77DD; --purple-t: #3C3489; --purple-s: #534AB7;
      --amber-bg: #FAEEDA; --amber-b: #EF9F27; --amber-t: #854F0B;
      --teal-t: #0F6E56; --teal-b: #1D9E75;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a1a; --bg2: #242424; --text: #f0f0f0; --text2: #999;
        --border: rgba(255,255,255,0.12); --border2: rgba(255,255,255,0.25);
        --purple-bg: #26215C; --purple-b: #7F77DD; --purple-t: #CECBF6; --purple-s: #AFA9EC;
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 3rem 5rem; }
    @media (max-width: 800px) { .wrap { padding: 1.5rem 1.25rem; } }
    h1 { font-size: 26px; font-weight: 500; margin-bottom: 6px; }
    .sub { font-size: 15px; color: var(--text2); margin-bottom: 2rem; }
    .hrow { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 6px; flex-wrap: wrap; }
    .upill { display: inline-flex; align-items: center; gap: 7px; font-size: 14px; color: var(--text2); padding: 6px 14px; border: 0.5px solid var(--border); border-radius: 99px; cursor: pointer; background: none; white-space: nowrap; }
    .upill:hover { background: var(--bg2); }

    /* Tabs */
    .tabs { display: flex; gap: 4px; margin-bottom: 2rem; border-bottom: 0.5px solid var(--border); overflow-x: auto; }
    .tab { padding: 10px 20px; font-size: 15px; background: none; border: none; outline: none; cursor: pointer; color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap; -webkit-tap-highlight-color: transparent; }
    .tab:focus { outline: none; }
    .tab:focus-visible { outline: 2px solid var(--purple-b); outline-offset: 2px; }
    .tab.active { color: var(--text); font-weight: 500; border-bottom-color: transparent; }

    .day-label { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.07em; margin: 2rem 0 1rem; }

    /* Session cards */
    .card { display: flex; align-items: flex-start; gap: 20px; padding: 16px 18px; border: 0.5px solid var(--border); border-radius: var(--r-lg); margin-bottom: 8px; background: var(--bg); transition: border-color 0.12s; }
    .card:hover { border-color: var(--border2); }
    .card.saved { border-color: var(--purple-b); background: var(--purple-bg); }
    .card.saved .ct a { color: var(--purple-t); }
    .card.saved .cm { color: var(--purple-s); }
    .ctime { font-size: 12px; color: var(--text2); width: 120px; min-width: 120px; padding-top: 3px; flex-shrink: 0; line-height: 1.5; }
    .cbody { flex: 1; min-width: 0; }
    .ct { font-size: 15px; font-weight: 500; margin-bottom: 3px; line-height: 1.45; }
    .ct a { color: inherit; text-decoration: none; }
    .ct a:hover { text-decoration: underline; color: var(--purple-s); }
    .card.saved .ct a:hover { color: var(--purple-t); }
    .cm { font-size: 13px; color: var(--text2); }
    .tags { display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap; }
    .tag { font-size: 11px; padding: 3px 9px; border-radius: 99px; background: var(--bg2); color: var(--text2); border: 0.5px solid var(--border); }
    .conflict { font-size: 11px; padding: 3px 9px; background: var(--amber-bg); color: var(--amber-t); border-radius: 99px; border: 0.5px solid var(--amber-b); }
    .att { display: flex; align-items: center; margin-top: 10px; flex-wrap: wrap; }
    .avlist { display: flex; margin-right: 10px; }
    .av { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 50%; font-size: 9px; font-weight: 600; border: 1.5px solid var(--bg); margin-right: -6px; color: #fff; flex-shrink: 0; }
    .anames { font-size: 13px; color: var(--text2); }
    .anames.me { color: var(--purple-s); }
    .sbtn { background: none; border: 0.5px solid var(--border2); border-radius: var(--r-md); width: 34px; height: 34px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text2); font-size: 16px; flex-shrink: 0; transition: all 0.12s; outline: none; }
    .sbtn:focus { outline: none; }
    .sbtn:hover { background: var(--bg2); }
    .sbtn.saved { color: var(--purple-s); border-color: var(--purple-b); }

    /* Stats / share */
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.75rem; }
    .stat { background: var(--bg2); border-radius: var(--r-md); padding: 16px; text-align: center; }
    .stat-n { font-size: 26px; font-weight: 500; }
    .stat-l { font-size: 13px; color: var(--text2); margin-top: 3px; }
    .sbar { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border: 0.5px solid var(--border); border-radius: var(--r-lg); background: var(--bg2); margin-bottom: 1.75rem; }
    .sbar input { flex: 1; background: none; border: none; font-size: 13px; color: var(--text2); outline: none; font-family: monospace; min-width: 0; }

    /* Buttons / inputs */
    button { font-family: inherit; font-size: 14px; padding: 8px 16px; border-radius: var(--r-md); border: 0.5px solid var(--border2); background: none; color: var(--text); cursor: pointer; transition: background 0.12s; outline: none; }
    button:focus { outline: none; }
    button:focus-visible { outline: 2px solid var(--purple-b); outline-offset: 2px; }
    button:hover { background: var(--bg2); }
    input[type="text"] { font-family: inherit; font-size: 14px; padding: 9px 13px; border-radius: var(--r-md); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); outline: none; width: 100%; }
    input[type="text"]:focus { border-color: var(--purple-b); }

    /* Onboard */
    .onboard { max-width: 380px; margin: 4rem auto; padding: 2.5rem; border: 0.5px solid var(--border); border-radius: var(--r-lg); }
    .onboard h2 { font-size: 20px; font-weight: 500; margin-bottom: 8px; }
    .onboard p { font-size: 15px; color: var(--text2); margin-bottom: 1.5rem; line-height: 1.6; }
    .onboard input { margin-bottom: 10px; }
    .onboard button { width: 100%; margin-top: 4px; }
    .err { font-size: 13px; color: #c0392b; margin-top: 4px; }
    .empty { text-align: center; padding: 4rem 1rem; color: var(--text2); font-size: 15px; }
    .empty i { font-size: 36px; display: block; margin-bottom: 14px; opacity: 0.3; }

    /* Filter area */
    .filter-search { margin-bottom: 0.85rem; }
    .filter-search input { font-size: 14px; padding: 9px 13px; }
    .filter-tags { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin-bottom: 1.5rem; }
    .fchip { font-size: 12px; padding: 5px 12px; border-radius: 99px; border: 0.5px solid var(--border); background: none; color: var(--text2); cursor: pointer; transition: all 0.12s; }
    .fchip:hover { border-color: var(--border2); color: var(--text); }
    .fchip.on { background: var(--text); color: var(--bg); border-color: var(--text); }
    .fchip-clear { font-size: 12px; padding: 5px 12px; border-radius: 99px; border: 0.5px solid var(--border); background: none; color: var(--text2); cursor: pointer; margin-left: 4px; }
    .fchip-clear:hover { background: var(--bg2); }

    /* Team tab */
    .trow { display: flex; align-items: center; gap: 14px; padding: 14px 0; border-bottom: 0.5px solid var(--border); cursor: pointer; }
    .trow:hover .tname { color: var(--purple-s); }
    .tav { width: 40px; height: 40px; border-radius: 50%; font-size: 14px; font-weight: 500; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: #fff; }
    .tname { font-size: 15px; font-weight: 500; transition: color 0.12s; }
    .tsub { font-size: 13px; color: var(--text2); }
    .tchevron { margin-left: auto; font-size: 15px; color: var(--text2); transition: transform 0.2s; }
    .tchevron.open { transform: rotate(180deg); }
    .texpand { padding: 8px 0 4px 54px; }
    .texpand-card { font-size: 14px; padding: 9px 0; border-bottom: 0.5px solid var(--border); color: var(--text); display: flex; gap: 16px; align-items: flex-start; }
    .texpand-card:last-child { border-bottom: none; }
    .texpand-time { font-size: 12px; color: var(--text2); min-width: 110px; flex-shrink: 0; padding-top: 2px; line-height: 1.5; }
    .texpand-title a { color: inherit; text-decoration: none; font-weight: 500; }
    .texpand-title a:hover { text-decoration: underline; color: var(--purple-s); }
    .texpand-room { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .texpand-empty { font-size: 14px; color: var(--text2); padding: 10px 0; font-style: italic; }
  </style>
</head>

const DAYS = ["June 23","June 24","June 25"];
const COLORS = ["#7F77DD","#1D9E75","#D85A30","#378ADD","#BA7517","#D4537E","#639922","#7B5EA7"];
const ALL_TAGS = [...new Set(S.flatMap(s=>s.tags))].filter(t=>!["logistics","social","community"].includes(t)).sort();

let sb, me, bookmarks=[], users=[], tab="all", copied=false, nameErr="", search="", filterTags=new Set(), expandedUser=null;

const gi = n => n.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);
const uc = id => { let h=0; for(let c of id) h=(h*31+c.charCodeAt(0))&0xffff; return COLORS[h%COLORS.length]; };

async function init(){
  sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
  const stored=localStorage.getItem("cfg26_uid");
  if(stored){ const {data}=await sb.from("users").select("*").eq("id",stored).single(); if(data) me=data; }
  await load(); render();
  sb.channel("rt")
    .on("postgres_changes",{event:"*",schema:"public",table:"bookmarks"},async()=>{await load();render();})
    .on("postgres_changes",{event:"*",schema:"public",table:"users"},async()=>{await load();render();})
    .subscribe();
}

async function load(){
  const [b,u]=await Promise.all([sb.from("bookmarks").select("*"),sb.from("users").select("*")]);
  bookmarks=b.data||[]; users=u.data||[];
}

async function register(){
  const el=document.getElementById("ni"); const name=(el?el.value:"").trim(); nameErr="";
  if(!name){nameErr="Please enter your name.";render();return;}
  const {data,error}=await sb.from("users").insert({name}).select().single();
  if(error||!data){nameErr="Something went wrong—try again.";render();return;}
  localStorage.setItem("cfg26_uid",data.id); me=data; await load(); render();
}

async function toggleSave(sid){
  if(!me) return;
  const has=bookmarks.find(b=>b.user_id===me.id&&b.session_id===sid);
  if(has){ await sb.from("bookmarks").delete().eq("user_id",me.id).eq("session_id",sid); bookmarks=bookmarks.filter(b=>!(b.user_id===me.id&&b.session_id===sid)); }
  else { await sb.from("bookmarks").insert({user_id:me.id,session_id:sid}); bookmarks=[...bookmarks,{user_id:me.id,session_id:sid}]; }
  render();
}

const mySet=()=>me?new Set(bookmarks.filter(b=>b.user_id===me.id).map(b=>b.session_id)):new Set();

function parseMinutes(t){
  // e.g. "9:00 AM", "12:10 PM", "1:30"
  t=t.trim();
  const pm=t.match(/pm/i)!==null; const am=t.match(/am/i)!==null;
  const [h,m]=(t.replace(/[apm\s]/gi,"")).split(":").map(Number);
  let hours=h; if(pm&&h!==12) hours+=12; if(am&&h===12) hours=0;
  return hours*60+(m||0);
}
function parseRange(timeStr){
  // e.g. "11:10 – 11:30 AM" or "11:50 AM – 12:10 PM" or "9:00 – 10:20 AM"
  const parts=timeStr.split(/\s*[–-]\s*/);
  if(parts.length<2) return null;
  let [a,b]=parts;
  // if first part has no AM/PM, inherit from second
  if(!/[apm]/i.test(a)&&/[apm]/i.test(b)){
    const suffix=b.match(/[apm]+/i)[0]; a=a.trim()+" "+suffix;
  }
  return [parseMinutes(a),parseMinutes(b)];
}
function overlaps(r1,r2){
  if(!r1||!r2) return false;
  return r1[0]<r2[1]&&r2[0]<r1[1];
}
const SKIP_CONFLICT_TAGS=new Set(["logistics","social","community"]);
function getConflicts(ids){
  const ss=S.filter(s=>ids.has(s.id)&&!s.tags.some(t=>SKIP_CONFLICT_TAGS.has(t))); const cx=new Set();
  for(let i=0;i<ss.length;i++) for(let j=i+1;j<ss.length;j++)
    if(ss[i].day===ss[j].day&&overlaps(parseRange(ss[i].time),parseRange(ss[j].time))){cx.add(ss[i].id);cx.add(ss[j].id);}
  return cx;
}

function attendees(sid){ const uids=bookmarks.filter(b=>b.session_id===sid).map(b=>b.user_id); return users.filter(u=>uids.includes(u.id)); }
function copyLink(){ navigator.clipboard.writeText(location.href).then(()=>{copied=true;render();setTimeout(()=>{copied=false;render();},2000);}); }
function logout(){ localStorage.removeItem("cfg26_uid"); me=null; tab="all"; render(); }

function toggleTag(t){ filterTags.has(t)?filterTags.delete(t):filterTags.add(t); render(); }
function clearTags(){ filterTags.clear(); render(); }
function toggleUser(uid){ expandedUser=expandedUser===uid?null:uid; render(); }

function renderAtt(sid){
  const att=attendees(sid); if(!att.length) return "";
  const isMe=me&&att.find(u=>u.id===me.id);
  const others=att.filter(u=>!me||u.id!==me.id);
  const names=[isMe?"you":null,...others.map(u=>u.name)].filter(Boolean);
  const disp=names.length<=2?names.join(" & "):names.slice(0,2).join(", ")+` + ${names.length-2} more`;
  return `<div class="att"><div class="avlist">${att.slice(0,5).map(u=>`<div class="av" style="background:${uc(u.id)}">${gi(u.name)}</div>`).join("")}</div><span class="anames ${isMe?"me":""}">${disp} going</span></div>`;
}

function renderCard(s,cx){
  const saved=mySet(); const sv=saved.has(s.id); const conflict=cx.has(s.id);
  return `<div class="card ${sv?"saved":""}">
    <div class="ctime">${s.time}</div>
    <div class="cbody">
      <div style="display:flex;align-items:center;flex-wrap:wrap;gap:5px">
        <span class="ct"><a href="${s.href}" target="_blank" rel="noopener">${s.title}</a></span>
        ${conflict?`<span class="conflict">⚡ conflict</span>`:""}
      </div>
      <div class="cm">${s.speaker?s.speaker+" · ":""}${s.room}</div>
      <div class="tags">${s.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>
      ${renderAtt(s.id)}
    </div>
    <button class="sbtn ${sv?"saved":""}" onclick="toggleSave(${s.id})" aria-label="${sv?"Remove":"Save"}"><i class="ti ${sv?"ti-bookmark-filled":"ti-bookmark"}"></i></button>
  </div>`;
}

function render(){
  const app=document.getElementById("app");
  if(!me){
    app.innerHTML=`<div class="onboard"><h2>Who are you?</h2><p>Enter your name so teammates can see which sessions you're planning to attend.</p><input type="text" id="ni" placeholder="Your name" onkeydown="if(event.key==='Enter')register()" autofocus />${nameErr?`<div class="err">${nameErr}</div>`:""}<button onclick="register()">Join the agenda</button></div>`;
    return;
  }

  const saved=mySet(); const cx=getConflicts(saved); const mine=S.filter(s=>saved.has(s.id));

  let filtered=S;
  if(search) filtered=filtered.filter(s=>s.title.toLowerCase().includes(search.toLowerCase())||s.speaker.toLowerCase().includes(search.toLowerCase()));
  if(filterTags.size) filtered=filtered.filter(s=>s.tags.some(t=>filterTags.has(t)));

  let html=`<div class="hrow">
    <div><h1>Config 2026 — agenda planner</h1><p class="sub">June 23–25 · Moscone Center, San Francisco</p></div>
    <button class="upill" onclick="logout()" title="Switch name">
      <div style="width:20px;height:20px;border-radius:50%;background:${uc(me.id)};color:#fff;font-size:9px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0">${gi(me.name)}</div>
      ${me.name}<i class="ti ti-logout" style="font-size:12px"></i>
    </button>
  </div>
  <div class="tabs">
    <button class="tab ${tab==="all"?"active":""}" onclick="setTab('all')">All sessions</button>
    <button class="tab ${tab==="mine"?"active":""}" onclick="setTab('mine')">My agenda${saved.size?" ("+saved.size+")":""}</button>
    <button class="tab ${tab==="team"?"active":""}" onclick="setTab('team')">Team</button>
  </div>`;

  if(tab==="all"){
    // Search on its own line, then tag chips
    html+=`<div class="filter-search"><input type="text" placeholder="Search sessions or speakers…" value="${search.replace(/"/g,'&quot;')}" oninput="doSearch(this.value)" /></div>
    <div class="filter-tags">
      ${ALL_TAGS.map(t=>`<button class="fchip ${filterTags.has(t)?"on":""}" onclick="toggleTag('${t}')">${t}</button>`).join("")}
      ${filterTags.size?`<button class="fchip-clear" onclick="clearTags()">✕ clear filters</button>`:""}
    </div>`;
    for(const day of DAYS){
      const ds=filtered.filter(s=>s.day===day); if(!ds.length) continue;
      html+=`<div class="day-label">${day}</div>`; ds.forEach(s=>html+=renderCard(s,cx));
    }
    if(!filtered.length) html+=`<div class="empty" style="padding:2rem 0"><i class="ti ti-mood-empty"></i>No sessions match your filters.</div>`;

  } else if(tab==="mine"){
    if(!saved.size){
      html+=`<div class="empty"><i class="ti ti-bookmark"></i>No sessions saved yet.<br>Browse all sessions and tap the bookmark to add them.</div>`;
    } else {
      html+=`<div class="stats">
        <div class="stat"><div class="stat-n">${saved.size}</div><div class="stat-l">sessions</div></div>
        <div class="stat"><div class="stat-n">${Math.round(cx.size/2)}</div><div class="stat-l">conflicts</div></div>
        <div class="stat"><div class="stat-n">${users.length}</div><div class="stat-l">teammates</div></div>
      </div>
      <div class="sbar">
        <i class="ti ti-share" style="font-size:15px;color:var(--text2);flex-shrink:0"></i>
        <input type="text" value="${location.href}" readonly onclick="this.select()" />
        <button onclick="copyLink()" style="${copied?"color:var(--teal-t);border-color:var(--teal-b)":""}">${copied?"✓ copied":"copy link"}</button>
      </div>`;
      for(const day of DAYS){ const ds=mine.filter(s=>s.day===day); if(!ds.length) continue; html+=`<div class="day-label">${day}</div>`; ds.forEach(s=>html+=renderCard(s,cx)); }
    }

  } else {
    // Team tab with expandable rows
    if(!users.length){
      html+=`<div class="empty"><i class="ti ti-users"></i>No teammates yet — share the link!</div>`;
    } else {
      users.forEach(u=>{
        const uSaved=bookmarks.filter(b=>b.user_id===u.id).map(b=>b.session_id);
        const n=uSaved.length; const isMe=u.id===me.id; const open=expandedUser===u.id;
        const uSessions=S.filter(s=>uSaved.includes(s.id)).sort((a,b)=>{
          if(a.day!==b.day) return DAYS.indexOf(a.day)-DAYS.indexOf(b.day);
          return a.time.localeCompare(b.time);
        });
        html+=`<div class="trow" onclick="toggleUser('${u.id}')">
          <div class="tav" style="background:${uc(u.id)}">${gi(u.name)}</div>
          <div style="flex:1">
            <div class="tname">${u.name}${isMe?" (you)":""}</div>
            <div class="tsub">${n} session${n!==1?"s":""} saved</div>
          </div>
          <i class="ti ti-chevron-down tchevron ${open?"open":""}"></i>
        </div>`;
        if(open){
          html+=`<div class="texpand">`;
          if(!uSessions.length){
            html+=`<div class="texpand-empty">No sessions saved yet.</div>`;
          } else {
            let lastDay="";
            uSessions.forEach(s=>{
              if(s.day!==lastDay){ html+=`<div style="font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;padding:8px 0 4px">${s.day}</div>`; lastDay=s.day; }
              html+=`<div class="texpand-card">
                <div class="texpand-time">${s.time}</div>
                <div>
                  <div class="texpand-title"><a href="${s.href}" target="_blank" rel="noopener">${s.title}</a></div>
                  <div class="texpand-room">${s.room}</div>
                </div>
              </div>`;
            });
          }
          html+=`</div>`;
        }
      });
    }
    html+=`<div class="sbar" style="margin-top:1.5rem">
      <i class="ti ti-link" style="font-size:15px;color:var(--text2);flex-shrink:0"></i>
      <input type="text" value="${location.href}" readonly onclick="this.select()" />
      <button onclick="copyLink()" style="${copied?"color:var(--teal-t);border-color:var(--teal-b)":""}">${copied?"✓ copied":"invite teammates"}</button>
    </div>`;
  }

  app.innerHTML=html;
}

window.toggleSave=toggleSave; window.register=register;
window.setTab=t=>{tab=t;render();};
window.copyLink=copyLink; window.logout=logout;
window.doSearch=v=>{search=v;render();};
window.toggleTag=toggleTag; window.clearTags=clearTags;
window.toggleUser=toggleUser;

init();
</script>
</body>
</html>
